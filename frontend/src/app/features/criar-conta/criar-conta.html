<div class="register-host">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">

    <!-- Header -->
    <div class="logo-row">
      <div class="icon-wrap">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="20" y1="4" x2="20" y2="36" stroke="#7dd8ff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="4" y1="20" x2="36" y2="20" stroke="#7dd8ff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="7.5" y1="7.5" x2="32.5" y2="32.5" stroke="#7dd8ff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="32.5" y1="7.5" x2="7.5" y2="32.5" stroke="#7dd8ff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="20" y1="4" x2="16" y2="9" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="4" x2="24" y2="9" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="36" x2="16" y2="31" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="36" x2="24" y2="31" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="4" y1="20" x2="9" y2="16" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="4" y1="20" x2="9" y2="24" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="36" y1="20" x2="31" y2="16" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="36" y1="20" x2="31" y2="24" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="20" cy="20" r="3.5" fill="#b2ebf2"/>
        </svg>
      </div>
      <span class="brand">Gela<span class="brand-accent">bem</span></span>
    </div>

    <p class="subtitle">Crie sua conta e comece a organizar</p>



    <div class="card-divider"></div>

    <!-- Nome -->
    <div class="field">
      <label>Nome completo</label>
      <div class="input-wrap">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <input type="text" placeholder="Seu nome" [(ngModel)]="nome" />
      </div>
    </div>

    <!-- E-mail -->
    <div class="field">
      <label>E-mail</label>
      <div class="input-wrap">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
        </span>
        <input type="email" placeholder="seu@email.com" [(ngModel)]="email" />
      </div>
    </div>

    <!-- Senha -->
    <div class="field">
      <label>Senha</label>
      <div class="input-wrap">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input [type]="mostrarSenha ? 'text' : 'password'" placeholder="Mínimo 8 caracteres" [(ngModel)]="senha"/>
        <span class="eye" (click)="toggleSenha()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>
      <!-- Força da senha -->
      <div class="strength-wrap">
        <div class="strength-bar">
          <div class="strength-fill s2"></div>
        </div>
        <span class="strength-label">Médio</span>
      </div>
    </div>

    <!-- Confirmar senha -->
    <div class="field">
      <label>Confirmar senha</label>
      <div class="input-wrap">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </span>
        <input [type]="mostrarConfirmarSenha ? 'text' : 'password'" placeholder="Repita a senha" [(ngModel)]="repetirsenha"/>
        <span class="eye" (click)="toggleConfirmarSenha()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Botão criar conta -->
    <button class="btn-primary" (click)="validarSenha()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/>
        <line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
      Criar conta grátis
    </button>

    <div class="divider"><span>ou cadastre-se com</span></div>

    <p class="login-link">Já tem uma conta? <a href="#">Entrar</a></p>

  </div>
</div>
