<div class="listaItens">
    @for(item of itens$ | async; track item.id){
    <app-item-card
    [item]="item"
    [selecionavel]="modoSelecao"
    [selecionado]="isSelecionado(item)"
    (remover)="removerItem($event)"
    (editar)="editarItem($event)"
    (selecionar)="selecionarItem.emit($event)">
    </app-item-card>
    }
</div>
