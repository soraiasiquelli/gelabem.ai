<main class="mainGeladeira">

  <div class="bloco" [ngClass]="meta.classe">
    <button class="btnVoltar" type="button" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>

    <div class="bloco-decoracoes">
      <span class="circulo"></span>
      <span class="diamante"></span>
    </div>

    <div class="bloco-icone">{{ meta.icone }}</div>

    <div class="bloco-conteudo">
      <h2>{{ meta.titulo }}</h2>
      <p>{{ meta.desc }}</p>
    </div>
  </div>

  <div class="categorias">

    <button
      class="btnCategoria"
      [class.ativo]="categoriaSelecionada === 'Todos'"
      (click)="selecionarTodos()">
      Todos
    </button>

    @for (categoria of categorias; track categoria.id) {
      <button
        class="btnCategoria"
        [class.ativo]="categoriaSelecionada === categoria.nome"
        (click)="selecionarCategoria(categoria.nome); filtrarItens(categoria.id)">
        {{ categoria.nome }}
      </button>
    }

  </div>

  <app-lista-itens
    class="listaItesElement"
    [localId]="localId"
    [categoriaId]="categoriaIdSelecionada"
    [modoSelecao]="modoSelecao"
    [selecionados]="itensSelecionados"
    (selecionarItem)="toggleSelecaoItem($event)">
  </app-lista-itens>

  @if (mensagemSelecao) {
    <p class="mensagemSelecao">{{ mensagemSelecao }}</p>
  }

  <div class="acoesFixas">
    @if (modoSelecao) {
      <button class="btn-cancelar" (click)="cancelarSelecao()">
        Cancelar
      </button>
    } @else {
      <app-btn-adicionar [routerLink]="['/armazenamento', tipo, 'adicionar']"></app-btn-adicionar>
    }

    <button class="btn-receita" (click)="gerarReceita(tipo)">
      @if (modoSelecao) {
        ✅ Confirmar Seleção ({{ itensSelecionados.size }})
      } @else {
        🍽️ Gerar Receita
      }
    </button>
  </div>

</main>
