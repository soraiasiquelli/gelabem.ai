<div class="login-host">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">

    <!-- Header -->
    <div class="logo-row">
      <div class="icon-wrap">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="20" y1="4" x2="20" y2="36" stroke="#7dd8ff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="4" y1="20" x2="36" y2="20" stroke="#7dd8ff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="7.5" y1="7.5" x2="32.5" y2="32.5" stroke="#7dd8ff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="32.5" y1="7.5" x2="7.5" y2="32.5" stroke="#7dd8ff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="20" y1="4" x2="16" y2="9" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="4" x2="24" y2="9" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="36" x2="16" y2="31" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="36" x2="24" y2="31" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="4" y1="20" x2="9" y2="16" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="4" y1="20" x2="9" y2="24" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="36" y1="20" x2="31" y2="16" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="36" y1="20" x2="31" y2="24" stroke="#7dd8ff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="20" cy="20" r="3.5" fill="#b2ebf2"/>
        </svg>
      </div>
      <span class="brand">Gela<span class="brand-accent">bem</span></span>
    </div>

    <p class="subtitle">Entre para organizar sua geladeira com IA</p>

    <div class="card-divider"></div>

    <!-- E-mail -->
    <div class="field">
      <label>E-mail</label>
      <div class="input-wrap">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
        </span>
        <input type="email" placeholder="seu@email.com" [(ngModel)]="email"/>
      </div>
    </div>

    <!-- Senha -->
    <div class="field">
      <label>Senha</label>
      <div class="input-wrap">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input [type]="mostrarSenha ? 'text' : 'password'" placeholder="••••••••" [(ngModel)]="senha"/>
        <span class="eye" (click)="toggleSenha()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>
    </div>


    <button class="btn-primary" (click)="login()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Entrar
    </button>


    <p class="signup">Não tem uma conta? <a routerLink="/criar-conta">Criar conta grátis</a></p>

  </div>
</div>
